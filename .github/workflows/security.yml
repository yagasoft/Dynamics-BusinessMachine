name: security

on:
  push:
    branches:
      - main
      - release/**
      - hotfix/**
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dbm-app/package-lock.json
            dbm-script-lib/package-lock.json
            dbm-js-vm/package-lock.json
            dbm-web-resources/package-lock.json

      - name: Run npm dependency audits
        shell: pwsh
        run: .\eng\scripts\Invoke-NpmAudit.ps1

      - name: Upload npm audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ github.run_id }}
          path: artifacts/security/npm-audit
          if-no-files-found: error

  codeql:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        startsWith(github.ref, 'refs/heads/release/') ||
        startsWith(github.ref, 'refs/heads/hotfix/')
      ))
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp,javascript-typescript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dbm-app/package-lock.json
            dbm-script-lib/package-lock.json
            dbm-js-vm/package-lock.json
            dbm-web-resources/package-lock.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Build Node assets for CodeQL
        shell: pwsh
        run: .\eng\scripts\Invoke-NodeBuild.ps1

      - name: Restore legacy NuGet packages
        shell: pwsh
        run: .\eng\scripts\Restore-LegacyPackages.ps1

      - name: Build legacy .NET solution for CodeQL
        shell: pwsh
        run: .\eng\scripts\Build-DotNet.ps1

      - name: Analyze CodeQL results
        uses: github/codeql-action/analyze@v3

  security:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - secret-scan
      - dependency-audit
      - codeql
    steps:
      - name: Enforce security job results
        shell: bash
        run: |
          results=(
            "${{ needs.dependency-review.result }}"
            "${{ needs.secret-scan.result }}"
            "${{ needs.dependency-audit.result }}"
            "${{ needs.codeql.result }}"
          )

          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "A required security job finished with result: $result"
              exit 1
            fi
          done
