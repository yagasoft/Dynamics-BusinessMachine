name: deploy-dataverse

on:
  workflow_dispatch:
    inputs:
      artifact_version:
        description: SemVer release-candidate artifact version to deploy, for example 0.2.0 or 0.2.0-rc.1.
        required: true
        type: string
      allow_destructive_replace:
        description: Allow a one-time non-Prod solution delete and retry when plugin assembly identity drift blocks import.
        required: false
        default: false
        type: boolean
      target_environment:
        description: Dataverse environment to deploy to.
        required: true
        type: choice
        options:
          - Dev
          - UAT
          - Prod

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  deploy-dataverse:
    runs-on: windows-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dbm-app/package-lock.json
            dbm-contract/package-lock.json
            dbm-designer-core/package-lock.json
            dbm-dataverse-synthesis/package-lock.json
            dbm-script-lib/package-lock.json
            dbm-js-vm/package-lock.json
            dbm-web-resources/package-lock.json

      - name: Enforce deployment ref policy
        shell: pwsh
        run: .\eng\scripts\Test-DeploymentRefPolicy.ps1 -EnvironmentName "${{ inputs.target_environment }}"

      - name: Enforce pre-UAT or Prod security gate
        if: ${{ inputs.target_environment != 'Dev' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          .\eng\scripts\Test-WorkflowGate.ps1 `
            -WorkflowFileName 'security.yml' `
            -HeadSha "${{ github.sha }}"

      - name: Validate tracked environment baseline
        shell: pwsh
        run: |
          .\eng\scripts\Test-EnvironmentBaseline.ps1 `
            -EnvironmentName "${{ inputs.target_environment }}" `
            -DataverseUrl "${{ vars.DATAVERSE_URL }}" `
            -DataverseEnvironmentId "${{ vars.DATAVERSE_ENVIRONMENT_ID }}" `
            -AzureClientId "${{ vars.AZURE_CLIENT_ID }}" `
            -AzureTenantId "${{ vars.AZURE_TENANT_ID }}" `
            -AzureKeyVaultName "${{ vars.AZURE_KEYVAULT_NAME }}" `
            -AzureResourceGroup "${{ vars.AZURE_RESOURCE_GROUP }}" `
            -DbmSolutionName "${{ vars.DBM_SOLUTION_NAME }}" `
            -RequireEnvironmentVariables `
            -OutputPath (Join-Path $PWD 'artifacts\deployment-evidence\environment-baseline.json') | Out-Host

      - name: Setup .NET for PAC CLI
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build synthesis validation packages
        shell: pwsh
        run: .\eng\scripts\Invoke-NodeBuild.ps1 -Projects dbm-contract,dbm-dataverse-synthesis

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          pac-version-override: 2.4.1

      - name: Authenticate to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download release-candidate artifact
        id: artifact
        shell: pwsh
        env:
          ARTIFACT_NAME: release-candidate-${{ inputs.artifact_version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $artifactRoot = .\eng\scripts\Get-GitHubArtifact.ps1 -ArtifactName $env:ARTIFACT_NAME -OutputRoot (Join-Path $PWD 'artifacts\download')
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$artifactRoot"

      - name: Pull optional Key Vault secrets
        shell: pwsh
        run: |
          $secretNames = @(
            'applicationinsights-connection-string',
            'powerpages-client-secret',
            'servicebus-connection-string'
          )

          foreach ($secretName in $secretNames) {
            $value = az keyvault secret show --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" --name $secretName --query value -o tsv 2>$null
            $secretExitCode = $LASTEXITCODE

            if ($secretExitCode -eq 0 -and -not [string]::IsNullOrWhiteSpace($value)) {
              Write-Host "::add-mask::$value"
            }
            elseif ($secretExitCode -ne 0) {
              Write-Host "Optional secret '$secretName' was not available or could not be read from Key Vault '${{ vars.AZURE_KEYVAULT_NAME }}'; continuing."
            }
          }

          exit 0

      - name: Resolve release-candidate metadata
        id: candidate
        shell: pwsh
        env:
          ARTIFACT_ROOT: ${{ steps.artifact.outputs.path }}
          ARTIFACT_VERSION: ${{ inputs.artifact_version }}
        run: |
          $evidencePath = Join-Path $env:ARTIFACT_ROOT 'release-evidence.json'
          if (-not (Test-Path $evidencePath)) {
            throw "Release evidence file is missing: $evidencePath"
          }

          $evidence = Get-Content -Path $evidencePath -Raw | ConvertFrom-Json
          if ($evidence.version -ne $env:ARTIFACT_VERSION) {
            throw "Release evidence version '$($evidence.version)' does not match requested artifact version '$env:ARTIFACT_VERSION'."
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "solutionVersion=$($evidence.solutionVersion)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$($evidence.tag)"

      - name: Authenticate PAC with GitHub federation
        shell: pwsh
        run: |
          $pacPath = if (-not [string]::IsNullOrWhiteSpace($env:POWERPLATFORMTOOLS_PACPATH) -and (Test-Path $env:POWERPLATFORMTOOLS_PACPATH)) {
            (Resolve-Path $env:POWERPLATFORMTOOLS_PACPATH).Path
          } else {
            (Get-Command pac -ErrorAction Stop).Source
          }

          & $pacPath auth create --githubFederated --applicationId "${{ vars.AZURE_CLIENT_ID }}" --tenant "${{ vars.AZURE_TENANT_ID }}" --environment "${{ vars.DATAVERSE_URL }}"

      - name: Deploy Dataverse solution
        shell: pwsh
        env:
          ARTIFACT_ROOT: ${{ steps.artifact.outputs.path }}
          ALLOW_DESTRUCTIVE_REPLACE: ${{ inputs.allow_destructive_replace }}
        run: |
          $packageRoot = Join-Path $env:ARTIFACT_ROOT 'dataverse'
          $allowDestructiveReplace = [System.Convert]::ToBoolean($env:ALLOW_DESTRUCTIVE_REPLACE)
          .\eng\scripts\Invoke-DataverseDeployment.ps1 `
            -TargetEnvironment "${{ inputs.target_environment }}" `
            -PackageRoot $packageRoot `
            -DataverseUrl "${{ vars.DATAVERSE_URL }}" `
            -SolutionName "${{ vars.DBM_SOLUTION_NAME }}" `
            -ExpectedSolutionVersion "${{ steps.candidate.outputs.solutionVersion }}" `
            -EvidenceRoot (Join-Path $PWD 'artifacts\deployment-evidence') `
            -AllowSolutionReplaceOnPluginIdentityChange:$allowDestructiveReplace

      - name: Run Dataverse smoke validation
        shell: pwsh
        run: |
          .\eng\scripts\Test-DataverseSmoke.ps1 `
            -TargetEnvironment "${{ inputs.target_environment }}" `
            -DataverseUrl "${{ vars.DATAVERSE_URL }}" `
            -SolutionName "${{ vars.DBM_SOLUTION_NAME }}" `
            -ExpectedSolutionVersion "${{ steps.candidate.outputs.solutionVersion }}" `
            -EvidenceRoot (Join-Path $PWD 'artifacts\deployment-evidence')

      - name: Write deployment summary
        if: ${{ always() }}
        shell: pwsh
        env:
          ARTIFACT_VERSION: ${{ inputs.artifact_version }}
          ALLOW_DESTRUCTIVE_REPLACE: ${{ inputs.allow_destructive_replace }}
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
        run: |
          New-Item -ItemType Directory -Path (Join-Path $PWD 'artifacts\deployment-evidence') -Force | Out-Null
          $summary = [ordered]@{
            artifactVersion = $env:ARTIFACT_VERSION
            allowDestructiveReplace = [System.Convert]::ToBoolean($env:ALLOW_DESTRUCTIVE_REPLACE)
            targetEnvironment = $env:TARGET_ENVIRONMENT
            gitRef = $env:GITHUB_REF
            workflowRunId = $env:GITHUB_RUN_ID
            dataverseUrl = "${{ vars.DATAVERSE_URL }}"
          }
          $summary | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $PWD 'artifacts\deployment-evidence\deployment-summary.json') -Encoding UTF8

      - name: Upload deployment evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dataverse-deployment-${{ inputs.target_environment }}-${{ inputs.artifact_version }}
          path: artifacts/deployment-evidence
          if-no-files-found: error
