name: package-dataverse

on:
  push:
    branches:
      - main
      - release/**
      - hotfix/**
  workflow_call:
    inputs:
      artifact_name:
        description: Artifact name override.
        required: false
        type: string
        default: ""
      release_mode:
        description: Enable release-only packaging steps such as assembly signing.
        required: false
        type: boolean
        default: false
      run_solution_check:
        description: Run authenticated solution check after packaging.
        required: false
        type: boolean
        default: true
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  package-dataverse:
    if: ${{ !inputs.release_mode }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dbm-app/package-lock.json
            dbm-contract/package-lock.json
            dbm-designer-core/package-lock.json
            dbm-dataverse-synthesis/package-lock.json
            dbm-script-lib/package-lock.json
            dbm-js-vm/package-lock.json
            dbm-web-resources/package-lock.json

      - name: Setup .NET for PAC CLI
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          pac-version-override: 2.4.1

      - name: Resolve version
        id: version
        shell: pwsh
        run: .\eng\scripts\Get-DbmVersion.ps1 -AsGitHubOutput

      - name: Build Node assets
        shell: pwsh
        run: .\eng\scripts\Invoke-NodeBuild.ps1

      - name: Restore legacy NuGet packages
        shell: pwsh
        run: .\eng\scripts\Restore-LegacyPackages.ps1

      - name: Materialize app signing key
        id: signing
        shell: pwsh
        env:
          APP_SIGNING_KEY_B64: ${{ secrets.APP_SIGNING_KEY_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:APP_SIGNING_KEY_B64)) {
            throw "Required packaging signing key secret 'APP_SIGNING_KEY_B64' is unavailable."
          }

          try {
            $keyBytes = [System.Convert]::FromBase64String($env:APP_SIGNING_KEY_B64.Trim())
          }
          catch {
            throw "GitHub Actions secret 'APP_SIGNING_KEY_B64' must contain a base64-encoded SNK payload."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'dbm-app-signing-key.snk'
          [System.IO.File]::WriteAllBytes($keyPath, $keyBytes)
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$keyPath"

      - name: Build legacy .NET solution
        shell: pwsh
        run: .\eng\scripts\Build-DotNet.ps1 -EnableLegacyPackaging -AssemblyKeyFile "${{ steps.signing.outputs.path }}"

      - name: Package Dataverse artifacts
        shell: pwsh
        run: .\eng\scripts\Invoke-DataversePackaging.ps1 -RunSolutionCheck:$false -GenerateSettings:$true

      - name: Upload Dataverse package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataverse-${{ steps.version.outputs.semVer }}
          path: artifacts/dataverse
          if-no-files-found: error

  package-dataverse-call:
    if: ${{ inputs.release_mode }}
    runs-on: windows-latest
    environment: Dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dbm-app/package-lock.json
            dbm-contract/package-lock.json
            dbm-designer-core/package-lock.json
            dbm-dataverse-synthesis/package-lock.json
            dbm-script-lib/package-lock.json
            dbm-js-vm/package-lock.json
            dbm-web-resources/package-lock.json

      - name: Setup .NET for PAC CLI
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          pac-version-override: 2.4.1

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: .\eng\scripts\Get-DbmVersion.ps1 -AsGitHubOutput

      - name: Build Node assets
        shell: pwsh
        run: .\eng\scripts\Invoke-NodeBuild.ps1

      - name: Restore legacy NuGet packages
        shell: pwsh
        run: .\eng\scripts\Restore-LegacyPackages.ps1

      - name: Materialize app signing key
        id: signing
        shell: pwsh
        env:
          APP_SIGNING_KEY_B64: ${{ secrets.APP_SIGNING_KEY_B64 }}
        run: |
          $keyVaultSecret = $null
          $keyVaultSecretExitCode = 0
          $secretValue = $null
          $secretSource = $null

          $previousNativePreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $keyVaultSecret = az keyvault secret show --vault-name "${{ vars.AZURE_KEYVAULT_NAME }}" --name 'app-signing-key' --query value -o tsv 2>$null
            $keyVaultSecretExitCode = $LASTEXITCODE
          }
          finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativePreference
          }

          if ($keyVaultSecretExitCode -eq 0 -and -not [string]::IsNullOrWhiteSpace($keyVaultSecret)) {
            $secretValue = $keyVaultSecret.Trim()
            $secretSource = "Azure Key Vault '${{ vars.AZURE_KEYVAULT_NAME }}'"
          }

          if ([string]::IsNullOrWhiteSpace($secretValue) -and -not [string]::IsNullOrWhiteSpace($env:APP_SIGNING_KEY_B64)) {
            $secretValue = $env:APP_SIGNING_KEY_B64.Trim()
            $secretSource = "GitHub Actions secret 'APP_SIGNING_KEY_B64'"
            Write-Warning "Falling back to GitHub Actions signing key secret because Key Vault secret 'app-signing-key' was not available."
          }

          if ([string]::IsNullOrWhiteSpace($secretValue)) {
            throw "Required release packaging signing key is unavailable. Seed Key Vault secret 'app-signing-key' in '${{ vars.AZURE_KEYVAULT_NAME }}' or set GitHub Actions secret 'APP_SIGNING_KEY_B64'."
          }

          # The optional Key Vault probe can legitimately miss. Clear its handled native exit code
          # so the GitHub PowerShell wrapper does not fail the step after fallback succeeds.
          $global:LASTEXITCODE = 0
          Write-Host "Using signing key from $secretSource."

          try {
            $keyBytes = [System.Convert]::FromBase64String($secretValue)
          }
          catch {
            throw "$secretSource must contain a base64-encoded SNK payload."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'dbm-app-signing-key.snk'
          [System.IO.File]::WriteAllBytes($keyPath, $keyBytes)
          Add-Content -Path $env:GITHUB_OUTPUT -Value "path=$keyPath"

      - name: Build legacy .NET solution
        shell: pwsh
        run: .\eng\scripts\Build-DotNet.ps1 -EnableLegacyPackaging -AssemblyKeyFile "${{ steps.signing.outputs.path }}"

      - name: Authenticate PAC with GitHub federation
        shell: pwsh
        run: |
          $pacPath = if (-not [string]::IsNullOrWhiteSpace($env:POWERPLATFORMTOOLS_PACPATH) -and (Test-Path $env:POWERPLATFORMTOOLS_PACPATH)) {
            (Resolve-Path $env:POWERPLATFORMTOOLS_PACPATH).Path
          } else {
            (Get-Command pac -ErrorAction Stop).Source
          }

          & $pacPath auth create --githubFederated --applicationId "${{ vars.AZURE_CLIENT_ID }}" --tenant "${{ vars.AZURE_TENANT_ID }}" --environment "${{ vars.DATAVERSE_URL }}"

      - name: Package Dataverse artifacts
        shell: pwsh
        env:
          DBM_RUN_SOLUTION_CHECK: ${{ inputs.run_solution_check }}
        run: |
          $runSolutionCheck = [System.Convert]::ToBoolean($env:DBM_RUN_SOLUTION_CHECK)
          .\eng\scripts\Invoke-DataversePackaging.ps1 -RunSolutionCheck:$runSolutionCheck -GenerateSettings:$true

      - name: Resolve artifact name
        id: artifact
        shell: pwsh
        env:
          INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          $artifactName = if ([string]::IsNullOrWhiteSpace($env:INPUT_ARTIFACT_NAME)) {
            "dataverse-${{ steps.version.outputs.semVer }}"
          } else {
            $env:INPUT_ARTIFACT_NAME
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "name=$artifactName"

      - name: Upload Dataverse package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: artifacts/dataverse
          if-no-files-found: error
